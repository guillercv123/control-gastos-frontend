<div class="login">
  <h1>Control de Gastos</h1>
  <input type="email" placeholder="Correo" [(ngModel)]="email" [disabled]="cargando()" />
  <input type="password" placeholder="Contrase&ntilde;a" [(ngModel)]="password" [disabled]="cargando()" />
  <button (click)="entrar()" [disabled]="cargando()">
    {{ cargando() ? 'Entrando...' : 'Entrar' }}
  </button>
  @if (error()) {
    <p class="error">{{ error() }}</p>
  }
</div>
